spring:
  application:
    name: hotel-reservation-engine
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hotel_reservation}
    username: ${SPRING_DATASOURCE_USERNAME:hotel}
    password: ${SPRING_DATASOURCE_PASSWORD:hotel_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: hotel-reservation
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.enterprise.hotel.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
    access-token-expiration-ms: 900000      # 15 minutes
    refresh-token-expiration-ms: 604800000  # 7 days
  reservation:
    lock-ttl-seconds: 30          # Redis distributed lock TTL for a room-date key
    payment-window-minutes: 10    # how long a PAYMENT_PENDING reservation holds inventory
    max-retry-attempts: 3         # optimistic-lock retry attempts
  ratelimit:
    capacity: 100                 # requests per window per client
    window-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: hotel-reservation-engine

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
